<div class="cdk-dialog-content">
      <h3 class="text-lg font-bold mb-4">Configura visualizzazione</h3>
      
      <form (submit)="onSubmit($event)">
        <!-- Color Mode -->
        <div class="form-control mb-4">
        <div class="flex"> 

          <label class="label me-2">
            <span class="label-text font-semibold">Modalità colori</span>
          </label>
          <select 
            class="select select-bordered w-full"
            [value]="colorMode()"
            (change)="colorMode.set($any($event.target).value)"
          >
            <option value="monocolor">Monocromatico</option>
            <option value="triads">Triadi (Tonica, 3°, 5°)</option>
            <option value="all">Tutti i gradi</option>
            <option value="octaves">Per ottave</option>
          </select>
        </div>
        </div>

        <!-- Fretboard Color -->
        <div class="form-control mb-6">
          <label class="label">
            <span class="label-text font-semibold">Colore tastiera</span>
          </label>
          <div class="flex gap-2 flex-wrap">
            @for (style of fretboardStyles; track style.fretboard) {
              <button
                type="button"
                class="btn btn-sm"
                [class.btn-primary]="fretboardColor() === style.fretboard"
                [class.btn-ghost]="fretboardColor() !== style.fretboard"
                (click)="fretboardColor.set(style.fretboard)"
              >
                <div
                  class="w-4 h-4 rounded border border-base-content/20 mr-1"
                  [style.background-color]="style.fretboard"
                ></div>
                {{ style.label }}
              </button>
            }
          </div>
        </div>

        <!-- Audio Settings -->
        <div class="divider">Impostazioni Audio</div>
        
        <!-- Instrument Selector -->
        <div class="form-control mb-4">
          <label class="label">
            <span class="label-text font-semibold">Strumento</span>
          </label>
          <select 
            class="select select-bordered w-full"
            [ngModel]="instrument()"
            (ngModelChange)="instrument.set($event)"
            [ngModelOptions]="{standalone: true}"
          >
            @for (inst of instruments; track inst.value) {
              <option [value]="inst.value">{{ inst.label }}</option>
            }
          </select>
        </div>

        <!-- Volume Slider -->
        <div class="form-control mb-4">
          <label class="label">
            <span class="label-text font-semibold">Volume</span>
            <span class="label-text-alt me-2">{{ (volume() * 100).toFixed(0) }}%</span>
          </label>
          <input 
            type="range" 
            min="0" 
            max="1" 
            step="0.01"
            class="range range-primary"
            [value]="volume()"
            (input)="volume.set(+$any($event.target).value)"
          />
        </div>

        <!-- Reverb Slider -->
        <div class="form-control mb-4">
          <label class="label">
            <span class="label-text font-semibold">Reverb</span>
            <span class="label-text-alt me-2">{{ (reverb() * 100).toFixed(0) }}%</span>
          </label>
          <input 
            type="range" 
            min="0" 
            max="1" 
            step="0.01"
            class="range range-primary"
            [value]="reverb()"
            (input)="reverb.set(+$any($event.target).value)"
          />
        </div>

        <!-- Detune Slider -->
        <div class="form-control mb-4">
          <label class="label">
            <span class="label-text font-semibold">Detune</span>
            <span class="label-text-alt me-2">{{ detune().toFixed(0) }} cents</span>
          </label>
          <input 
            type="range" 
            min="-100" 
            max="100" 
            step="1"
            class="range range-primary"
            [value]="detune()"
            (input)="detune.set(+$any($event.target).value)"
          />
        </div>

        <!-- Checkboxes -->
        <div class="flex">
          <div class="form-control mb-4 me-6">
            <label class="label cursor-pointer justify-start gap-3">
              <input 
                type="checkbox" 
                class="checkbox checkbox-primary"
                [checked]="sustain()"
                (change)="sustain.set($any($event.target).checked)"
              />
              <span class="label-text">Sustain</span>
            </label>
          </div>
          <div class="form-control mb-6">
            <label class="label cursor-pointer justify-start gap-3">
              <input 
                type="checkbox" 
                class="checkbox checkbox-primary"
                [checked]="playMetronome()"
                (change)="playMetronome.set($any($event.target).checked)"
              />
              <span class="label-text">Metronomo</span>
            </label>
          </div>
        </div>

        <div class="modal-action">
          <button type="button" class="btn" (click)="dialogRef.close()">Annulla</button>
          <button type="submit" class="btn btn-dash btn-primary">Salva</button>
        </div>
      </form>
    </div>
